<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Top Trumps</title>
</head>
<body>

  <h1>Harry Potter Top Trumps</h1>

  <button id="draw-btn">Draw Characters</button>

  <div id="player">
    <h2>Player</h2>
    <p id="player-name"></p>
    <p id="player-stat"></p>
    <button class="stat-btn" data-stat="yearOfBirth"> Year Of Birth </button>
  </div>

  <div id="computer">
    <h2>Computer</h2>
    <p id="computer-name"></p>
    <p id="computer-stat"></p>
  </div>

  <h2 id="result"></h2>

  <script src="script.js"></script>
</body>
</html>
